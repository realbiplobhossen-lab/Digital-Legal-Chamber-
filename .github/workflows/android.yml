        # LegalApp.kt
        cat << 'EOF' > app/src/main/java/com/example/ui/LegalApp.kt
        package com.example.ui
        
        import androidx.compose.foundation.layout.Box
        import androidx.compose.foundation.layout.padding
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.graphics.Color
        import com.example.ui.screens.*
        
        @OptIn(ExperimentalMaterial3Api::class)
        @Composable
        fun LegalApp(viewModel: com.example.viewmodel.LegalViewModel) {
            var currentScreen by remember { mutableStateOf(0) }
            val darkBackground = Color(0xFF0F131E)
            val cardColor = Color(0xFF1E2538)
            
            MaterialTheme {
                Scaffold(
                    topBar = {
                        TopAppBar(
                            title = { Text("ড্যাশবোর্ড", color = Color.White) },
                            colors = TopAppBarDefaults.topAppBarColors(containerColor = darkBackground)
                        )
                    },
                    bottomBar = {
                        NavigationBar(containerColor = cardColor) {
                            NavigationBarItem(
                                selected = currentScreen == 0,
                                onClick = { currentScreen = 0 },
                                label = { Text("হোম", color = Color.White) },
                                icon = {},
                                colors = NavigationBarItemDefaults.colors(indicatorColor = Color(0xFF4527A0))
                            )
                            NavigationBarItem(
                                selected = currentScreen == 1,
                                onClick = { currentScreen = 1 },
                                label = { Text("মক্কেল", color = Color.White) },
                                icon = {},
                                colors = NavigationBarItemDefaults.colors(indicatorColor = Color(0xFF4527A0))
                            )
                            NavigationBarItem(
                                selected = currentScreen == 2,
                                onClick = { currentScreen = 2 },
                                label = { Text("কেস ডায়েরি", color = Color.White) },
                                icon = {},
                                colors = NavigationBarItemDefaults.colors(indicatorColor = Color(0xFF4527A0))
                            )
                            NavigationBarItem(
                                selected = currentScreen == 3,
                                onClick = { currentScreen = 3 },
                                label = { Text("এআই চ্যাট", color = Color.White) },
                                icon = {},
                                colors = NavigationBarItemDefaults.colors(indicatorColor = Color(0xFF4527A0))
                            )
                            NavigationBarItem(
                                selected = currentScreen == 4,
                                onClick = { currentScreen = 4 },
                                label = { Text("লাইব্রেরি", color = Color.White) },
                                icon = {},
                                colors = NavigationBarItemDefaults.colors(indicatorColor = Color(0xFF4527A0))
                            )
                        }
                    }
                ) { innerPadding ->
                    Box(modifier = Modifier.padding(innerPadding)) {
                        when (currentScreen) {
                            0 -> DashboardScreen(viewModel)
                            1 -> ClientScreen(viewModel)
                            2 -> CaseScreen(viewModel)
                            3 -> AiAssistantScreen(viewModel)
                            4 -> LibraryScreen(viewModel)
                        }
                    }
                }
            }
        }
        EOF

    - name: Create Dummy Google Services JSON
      run: |
        mkdir -p app
        echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.aistudio.digitallegalchamber.lkjsda"}},"api_key":[{"current_key":"dummy"}],"services":{}}],"configuration_version":"3"}' > app/google-services.json

    - name: Create Production .env file from GitHub Secrets
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> .env
        echo "STORE_PASSWORD=android" >> .env
        echo "KEY_ALIAS=upload" >> .env
        echo "KEY_PASSWORD=android" >> .env

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --no-configuration-cache -x test
      
    - name: Upload Generated Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Digital-Legal-Chamber-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
