name: Android CI (Digital Legal Chamber)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ১. GitHub রিপোজিটরি থেকে কোড ডাউনলোড করা
    - name: Checkout project source code
      uses: actions/checkout@v4

    # ২. জাভা এনভায়রনমেন্ট (Java 17) সেটআপ করা
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ৩. উবুন্টু সার্ভারে সরাসরি লেটেস্ট Gradle 9.3.1 ইন্সটল করা
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    # ৪. Roborazzi প্লাগইন লাইনটি বিল্ড ফাইল থেকে রিমুভ করা
    - name: Disable Roborazzi plugin for CI Build
      run: |
        sed -i '/alias(libs.plugins.roborazzi)/d' app/build.gradle.kts

    # 🌟 ৫. টমেইল (TOML) এরর দূর করতে গ্র্যাডলের নিজস্ব Dependency Resolution Strategy যুক্ত করা
    # এটি বিল্ড ফাইলের শেষে এমন একটি নিয়ম জুড়ে দেবে যা ফায়ারবেসের সঠিক ভার্সন ফোর্স করে বসিয়ে দেবে।
    - name: Inject Safe Dependency Resolution Strategy
      run: |
        sed -i 's/libs.androidx.compose.material.icons.core/"androidx.compose.material:material-icons-core:1.7.0"/g' app/build.gradle.kts
        sed -i 's/libs.androidx.compose.material.icons.extended/"androidx.compose.material:material-icons-extended:1.7.0"/g' app/build.gradle.kts
        sed -i 's/libs.firebase.analytics/"com.google.firebase:firebase-analytics-ktx"/g' app/build.gradle.kts
        sed -i 's/libs.firebase.appcheck.playintegrity/"com.google.firebase:firebase-appcheck-playintegrity"/g' app/build.gradle.kts
        sed -i 's/libs.firebase.appcheck.recaptcha/"com.google.firebase:firebase-appcheck-recaptcha"/g' app/build.gradle.kts
        
        echo '
        configurations.all {
            resolutionStrategy.eachDependency {
                if (requested.group == "com.google.firebase") {
                    if (requested.name == "firebase-appcheck-recaptcha") {
                        useVersion("16.1.2")
                    }
                    if (requested.name == "firebase-appcheck-playintegrity") {
                        useVersion("17.1.1")
                    }
                    if (requested.name == "firebase-analytics-ktx" || requested.name == "firebase-analytics") {
                        useVersion("21.5.0")
                    }
                }
            }
        }
        ' >> app/build.gradle.kts

    # ⑥. ডামি google-services.json ফাইলটি তৈরি করা যেন প্লাগইন ক্র্যাশ না করে
    - name: Create Dummy Google Services JSON
      run: |
        mkdir -p app
        echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.aistudio.digitallegalchamber.lkjsda"}},"api_key":[{"current_key":"dummy"}],"services":{}}],"configuration_version":"3"}' > app/google-services.json

    # ৭. GitHub Secrets থেকে সুরক্ষিতভাবে আসল Gemini API Key নিয়ে .env ফাইল তৈরি করা
    - name: Create Production .env file from GitHub Secrets
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> .env
        echo "STORE_PASSWORD=android" >> .env
        echo "KEY_ALIAS=upload" >> .env
        echo "KEY_PASSWORD=android" >> .env

    # ৮. সরাসরি মূল অ্যান্ড্রয়েড অ্যাপের ডিবাগ APK বিল্ড করা
    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --no-configuration-cache -x test
      
    # ⑨. তৈরি হওয়া সফল অ্যাপ (APK) আউটপুট হিসেবে সংরক্ষণ করা
    - name: Upload Generated Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Digital-Legal-Chamber-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
