name: Android CI (Digital Legal Chamber)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ১. GitHub রিপোজিটরি থেকে কোড ডাউনলোড করা
    - name: Checkout project source code
      uses: actions/checkout@v4

    # ২. জাভা এনভায়রনমেন্ট (Java 17) সেটআপ করা
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🌟 ৩. উবুন্টু সার্ভারে সরাসরি লেটেস্ট Gradle 9.3.1 ইন্সটল করা (প্লাগইন কনফ্লিক্ট দূর করার জন্য)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1

    # ৪. GitHub Secrets থেকে সুরক্ষিতভাবে আসল Gemini API Key নিয়ে .env ফাইল তৈরি করা
    - name: Create Production .env file from GitHub Secrets
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> .env
        echo "STORE_PASSWORD=android" >> .env
        echo "KEY_ALIAS=upload" >> .env
        echo "KEY_PASSWORD=android" >> .env

    # ৫. সার্ভারের নিজস্ব গ্র্যাডল দিয়ে লোকাল ইউনিট টেস্ট রান করা
    - name: Run Local Unit Tests
      run: gradle testDebugUnitTest --no-daemon

    # ⑥. সার্ভারের নিজস্ব গ্র্যাডল দিয়ে অ্যান্ড্রয়েড অ্যাপের ডিবাগ APK বিল্ড করা
    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    # ৭. তৈরি হওয়া সফল অ্যাপ (APK) আউটপুট হিসেবে সংরক্ষণ করা
    - name: Upload Generated Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Digital-Legal-Chamber-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
