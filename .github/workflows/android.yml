name: Android CI (Digital Legal Chamber)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ১. GitHub রিপোজিটরি থেকে কোড ডাউনলোড (Checkout) করা
    - name: Checkout project source code
      uses: actions/checkout@v4

    # ২. জাভা এনভায়রনমেন্ট (Java 17) সেটআপ করা
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 🌟 ৩. অফিশিয়াল সার্ভার থেকে নিখুঁত gradle-wrapper.jar ফাইলটি অটোমেটিক ডাউনলোড করা
    - name: Download fresh gradle-wrapper.jar automatically
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar

    # ৪. GitHub Secrets থেকে সুরক্ষিতভাবে আসল Gemini API Key নিয়ে .env ফাইল তৈরি করা
    - name: Create Production .env file from GitHub Secrets
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> .env
        echo "STORE_PASSWORD=android" >> .env
        echo "KEY_ALIAS=upload" >> .env
        echo "KEY_PASSWORD=android" >> .env

    # ৫. গ্র্যাডল স্ক্রিপ্ট রান করার এক্সিকিউটেবল পারমিশন দেওয়া
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ⑥. প্রোজেক্টের লোকাল ইউনিট টেস্টগুলো ব্যাকগ্রাউন্ডে রান করা
    - name: Run Local Unit Tests
      run: ./gradlew testDebugUnitTest

    # ৭. অ্যান্ড্রয়েড অ্যাপের ডিবাগ APK বিল্ড করা
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # ৮. তৈরি হওয়া সফল অ্যাপ (APK) আউটপুট হিসেবে সংরক্ষণ করা
    - name: Upload Generated Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Digital-Legal-Chamber-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
